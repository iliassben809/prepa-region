<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #ab55f8;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            }
        span {
                position: relative;
                font-family: sans-serif;
                color: white ; 
                font-size: 5rem;
                top: 20px;
                animation: bounce 0.4s ease infinite alternate;
            }

            h1 span :nth-child(2){animation-delay: 0.1s;}
            h1 span :nth-child(3){animation-delay: 0.2s;}
            h1 span :nth-child(4){animation-delay: 0.3s;}
            h1 span :nth-child(5){animation-delay: 0.4s;}
            h1 span :nth-child(6){animation-delay: 0.5s;}

@keyframes bounce{
    100%{
        top: -20px;
    }
}
    </style>
</head>

<body>
    <h1>
    <span>F</span>
    <span>U</span>
    <span>C</span>
    <span>K</span>
    <br>
    <span>U</span>
    <span>🖕🏿</span>
    </h1>
</body>

</html>
