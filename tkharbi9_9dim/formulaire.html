<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
     h1[align="centre"]{
        text-decoration: underline;
        font-weight: bold ;
     }
      legend[align^="center"]{
        color: brown;
      }    
    </style>
</head>

<body>
    <fieldset style="width: fit-content;margin: auto;background-color: rgb(174, 177, 177);">
        <h1 align="centre">Mon premier formulaire HTML5:</h1>
         <form action="" method="get" style="display: inline;">
        <fieldset>
            <legend align="center-A"><U>Vos Donnes personneles:</U></legend>
            <label for="a"><U>Nom:</U></label>
            <input type="text" id="a" placeholder="votre nom" pattern="[A-Z][a-zA-Z]{1,}"><br><br>
            <label for="b"><u>Prenom:</u></label>
            <input type="text" id="b" placeholder="votre prenom"><br><br>
            <label for="c"><u>Date de naissance:</u></label>
            <input type="date" id="c"><br><br>
            <fieldset>
            <legend align="center-B"><u>Lieu de naissance:</u></legend>
            <input type="radio" name="rabat" id="d" checked>
            <label for="d">rabat</label>
            <input type="radio" name="sale" id="e">
            <label for="e">sale</label>
            </fieldset><br><br>
            <fieldset>
            <legend align="center-C"><u>Option NSI en bac:</u></legend>
            <input type="radio" name="oui" id="f" checked>
            <label for="f">Oui</label>
            <input type="radio" name="non" id="g">
            <label for="g">Non</label>
            </fieldset><br><br>
            <label for="i"><u>Adresse Postale:</u></label>
            <textarea type="text" id="i" placeholder="votre adresse"></textarea><br><br>
            <label for="j"><u>Code Postale:</u></label>
            <input type="password" id="j" placeholder="Au moin 6 caractere" pattern="[a-zA-Z&&[0-9]]{5,}"><br><br>
            <label for="k"><u>Adresse Electronique:</u></label>
            <input type="text" id="k" placeholder="votre adresse"><br><br>
            <label for="l"><u>Page personnele:</u></label>
            <input type="text" id="l" placeholder="votre page"><br><br>
            <label for="m"><u>Telephone Portable:</u></label>
            <input class="abcd" type="number" id="m" placeholder="0769908707"><br><br>
            <label for="sem">semestre</label>
         <select name="sem" id="sem">
            <option value="S1">S1</option>
            <option value="S2">S2</option>
         </select><br><br>
            <label for="o"><mark><U>~Niveau en HTML</U></mark></label>
            <input type="range" id="o" max="10" min="0"><br><br>
            <fieldset>
            <legend><u>Connaissances:</u></legend>
            <input type="checkbox" id="1" checked>
            <label for="1">Html</label>
            <input type="checkbox" id="2">
            <label for="2">Css</label>
            <input type="checkbox" id="3">
            <label for="3">Formulaire</label>
            <input type="checkbox" id="4">
            <label for="4">JavaScript</label>
            </fieldset><br><br>
            <form>
                <label for="file">~</label>
                <input type="file" id="file">
            </form><br><br>
            <button type="submit" style="color: rgb(2, 82, 2);">Envoyer</button> 
            <button type="reset" style="color: rgb(106, 4, 4);">Reinisialiser</button>
             </form>
            </fieldset>
            <b>formulaire realise dans le cadre du corps de developpement web.</b>
</body>

</html>
