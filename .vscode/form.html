<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Réclamation</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(120deg, #1d3557, #457b9d);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            background: linear-gradient(120deg, #0d6efd, #00b4d8);
            color: white;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 20px 20px 0 0;
            padding: 20px;
        }

        .form-label {
            font-weight: 600;
        }

        .btn-send {
            background: linear-gradient(120deg, #0d6efd, #00b4d8);
            border: none;
            font-weight: bold;
        }

        .btn-send:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">

            <div class="card">
                <div class="card-header">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    Formulaire de réclamation
                </div>

                <div class="card-body p-4">

                    <form>

                        <!-- Nom -->
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-person-fill"></i> Nom et prénom
                            </label>
                            <input type="text" class="form-control" placeholder="Votre nom complet">
                        </div>

                        <!-- Filière -->
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-book-fill"></i> Filière
                            </label>
                            <input type="text" class="form-control" placeholder="Ex : Développement Digital">
                        </div>

                        <!-- Année d'études -->
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-mortarboard-fill"></i> Année d’études
                            </label>
                            <select class="form-select">
                                <option selected disabled>Choisir l'année</option>
                                <option>1ère année</option>
                                <option>2ème année</option>
                                <option>3ème année</option>
                            </select>
                        </div>

                        <!-- Problèmes -->
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-list-check"></i> Problèmes rencontrés
                            </label>

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox">
                                <label class="form-check-label">Problèmes d’organisation</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox">
                                <label class="form-check-label">Règlement intérieur strict ou peu clair</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox">
                                <label class="form-check-label">Horaires inadaptés</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox">
                                <label class="form-check-label">Manque de communication</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox">
                                <label class="form-check-label">Retard de traitement</label>
                            </div>
                        </div>

                        <!-- Description -->
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="bi bi-pencil-square"></i> Décrire le problème
                            </label>
                            <textarea class="form-control" rows="4" placeholder="Expliquez votre problème..."></textarea>
                        </div>

                        <!-- Button -->
                        <div class="d-grid">
                            <button class="btn btn-send btn-lg text-white">
                                <i class="bi bi-send-fill"></i> Envoyer la réclamation
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
