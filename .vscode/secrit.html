<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>❤️</title>

<style>
/* ================= ROOT ================= */
:root{
  --gold:#f5d77a;
  --dark:#000814;
  --wine:#55103a;
}

/* ================= RESET ================= */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Poppins', sans-serif;
}

/* ================= BODY ================= */
body{
  height:100vh;
  background:radial-gradient(circle at top, var(--wine), var(--dark));
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  color:white;
}

/* ================= PAGE 1 ================= */
.page{
  text-align:center;
  animation:fadeIn 1.5s ease;
}

h1{
  font-size:3rem;
  color:var(--gold);
  margin-bottom:40px;
  letter-spacing:2px;
  text-shadow:0 0 20px rgba(245,215,122,.3);
}

.buttons{
  position:relative;
  height:140px;
}

button{
  padding:16px 45px;
  font-size:1.3rem;
  border:none;
  border-radius:50px;
  cursor:pointer;
  position:absolute;
  transition:.35s ease;
}

/* YES */
#yes{
  background:linear-gradient(135deg,var(--gold),#c9a227);
  color:#000;
  left:50%;
  transform:translateX(-130%);
  box-shadow:0 0 30px rgba(245,215,122,.6);
}

/* NO */
#no{
  background:#2a1515;
  color:#fff;
  left:50%;
  transform:translateX(30%);
  border:1px solid #555;
}

/* ================= PAGE 2 ================= */
.love{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#140000,#55102a);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:1.5s ease;
}

.love.active{
  opacity:1;
  pointer-events:auto;
}

.box{
  max-width:900px;
  background:rgba(255,255,255,.06);
  padding:50px;
  border-radius:35px;
  backdrop-filter:blur(14px);
  box-shadow:0 0 80px rgba(245,215,122,.2);
  animation:zoomIn 1.5s ease;
  text-align:center;
}

.box h2{
  font-size:3rem;
  color:var(--gold);
  margin-bottom:20px;
  animation:pulse 2s infinite;
}

.box p{
  font-size:1.15rem;
  line-height:2;
  color:#eee;
}

/* ================= ANIMATIONS ================= */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(40px)}
  to{opacity:1; transform:translateY(0)}
}

@keyframes zoomIn{
  from{opacity:0; transform:scale(.8)}
  to{opacity:1; transform:scale(1)}
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.1)}
}

/* ================= HEARTS ================= */
.mouse-heart{
  position:fixed;
  pointer-events:none;
  font-size:14px;
  color:rgba(245,215,122,.7);
  animation:floatFade 2s ease forwards;
  z-index:1;
}

@keyframes floatFade{
  0%{
    transform:translate(-50%,-50%) scale(.6);
    opacity:1;
  }
  100%{
    transform:translate(-50%,-150px) scale(1.5);
    opacity:0;
  }
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page" id="page1">
  <h1>bgiti t3RAFTI NTI CHNO KATSWAY 3NDI ??</h1>
  <div class="buttons">
    <button id="yes">آه ✨</button>
    <button id="no">لا</button>
  </div>
</div>

<!-- PAGE 2 -->
<div class="love" id="love">
  <div class="box">
    <h2>❤️</h2>
    <p id="text"></p>
  </div>
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const love = document.getElementById("love");
const text = document.getElementById("text");

let scale = 1;
let messages = [
  "ti rak ti 🌙",
  "wakha kat3asbini mara mara 😡  ",
  "wlkn rak 3ziza wlh ❤️"
];

/* زر لا كيهرب */
noBtn.addEventListener("mouseenter", ()=>{
  const x = Math.random()*(window.innerWidth-150);
  const y = Math.random()*(window.innerHeight-150);
  noBtn.style.left = x+"px";
  noBtn.style.top = y+"px";

  scale += .15;
  yesBtn.style.transform = `translateX(-130%) scale(${scale})`;

  if(scale > 2.3){
    noBtn.style.display="none";
  }
});

/* YES */
yesBtn.addEventListener("click", ()=>{
  love.classList.add("active");
  typeWriter(messages.join(" "));
});

/* TYPE EFFECT */
function typeWriter(msg){
  let i = 0;
  text.innerHTML = "";
  let interval = setInterval(()=>{
    text.innerHTML += msg.charAt(i);
    i++;
    if(i >= msg.length) clearInterval(interval);
  },50);
}

/* HEARTS (light) */
document.addEventListener("mousemove", e=>{
  if(Math.random() > 0.85){
    const heart = document.createElement("div");
    heart.className = "mouse-heart";
    heart.innerHTML = "❤️";
    heart.style.left = e.clientX+"px";
    heart.style.top = e.clientY+"px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),2000);
  }
});
</script>

</body>
</html>
