            <h3>Inscription</h3>

  <form action="login.html">

    <div class="mb-2">
      <input type="text" class="form-control" name="nom" placeholder="Nom" required>
    </div>

    <div class="mb-2">
      <input type="text" class="form-control" name="prenom" placeholder="Prénom" required>
    </div>

    <div class="mb-2">
      <input type="text" class="form-control" name="username" placeholder="Nom d'utilisateur" required>
    </div>

    <div class="mb-2">
      <input type="email" class="form-control" name="email" placeholder="Email" required>
    </div>

    <div class="mb-2">
      <input type="tel" class="form-control" name="tel" placeholder="Téléphone" required>
    </div>

    <div class="mb-2">
      <input type="text" class="form-control" name="adresse" placeholder="Adresse">
    </div>

    <div class="mb-2">
      <input type="password" class="form-control" name="password" placeholder="Mot de passe" required>
    </div>

    <div class="mb-3">
      <input type="password" class="form-control" name="password2" placeholder="Confirmer le mot de passe" required>
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" required>
      <label class="form-check-label">
        J'accepte tout les conditions
      </label>
    </div>

      <button class="btn btn-dark w-100" >S'inscrit</button>
  </form>

  <p class="text-center mt-3">
    Déjà inscrit ? <a href="login.html">Connexion</a>
