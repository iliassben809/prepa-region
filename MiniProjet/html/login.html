<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="login.html">

</head>

<body>



  <div class="container">
    <div class="col-lg-9">

      <div class="card">
        <div class="row g-0">

          <!-- IMAGE -->
          <div class="col-md-6">
            <img src="login.jpg" class="img-fluid img-cover" alt="image">
          </div>

          <!-- LOGIN -->
          <div class="col-md-6 p-5 text-center">
            <h3 class="mb-4">Connectez-vous</h3>

            <form>

              <div class="mb-3">
                <input type="text" class="form-control" placeholder="Nom d'utilisateur" required>
              </div>
              <br>

              <div class="mb-3">
                <input type="password" class="form-control" placeholder="Mot de passe" required>
              </div>
              <br>

              <button class="btn btn-dark w-100 mb-3">Login</button>

              <div class="links">
                <a href="/MiniProjet/oublie.html" class="d-block text-danger mb-2 no-underline">
                  mot de passe oublié
                </a>
                <a href="/MiniProjet/inscription.html" class="d-block text-primary no-underline">
                  crée un nouveau compte ?
                </a>
              </div>

            </form>


          </div>
        </div>

      </div>
    </div>

</body>

</html>
